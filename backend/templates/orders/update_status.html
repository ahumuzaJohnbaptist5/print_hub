{% extends 'base.html' %}

{% block title %}Update Order Status - PrintHub{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-white mb-8">Update Order #{{ order.id }}</h1>

    <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-3xl p-8">
        <div class="space-y-3 text-gray-300 mb-8">
            <p class="flex justify-between"><span class="text-gray-400">Client:</span> <span>{{ order.client.username }}</span></p>
            <p class="flex justify-between"><span class="text-gray-400">File:</span> <span>{{ order.file_name }}</span></p>
            <p class="flex justify-between"><span class="text-gray-400">Current status:</span> <span class="text-white font-semibold">{{ order.get_status_display }}</span></p>
        </div>

        <form method="POST" action="{% url 'update_order_status' order.id %}" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">New Status</label>
                <select
                    name="status"
                    class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>Pending</option>
                    <option value="paid" {% if order.status == 'paid' %}selected{% endif %}>Paid</option>
                    <option value="printing" {% if order.status == 'printing' %}selected{% endif %}>Printing</option>
                    <option value="ready" {% if order.status == 'ready' %}selected{% endif %}>Ready for Pickup</option>
                    <option value="collected" {% if order.status == 'collected' %}selected{% endif %}>Collected</option>
                </select>
            </div>
            <button
                type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 rounded-xl hover:shadow-lg transition-all"
            >
                Update Status
            </button>
        </form>

        <a href="{% url 'dashboard' %}" class="block text-center text-gray-400 hover:text-white text-sm mt-6">← Back</a>
    </div>
</div>
{% endblock %}
