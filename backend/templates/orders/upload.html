{% extends 'base.html' %}

{% block title %}Upload Document - PrintHub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-white mb-8">Upload Document</h1>
    
    <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-3xl p-8">
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <!-- File Upload -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Select File (PDF, DOC, DOCX)</label>
                <input 
                    type="file" 
                    name="file" 
                    accept=".pdf,.doc,.docx"
                    class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600"
                    required
                />
            </div>
            
            <!-- Page Count -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Number of Pages</label>
                <input 
                    type="number" 
                    name="page_count" 
                    min="1" 
                    value="1"
                    class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                />
                <p class="text-gray-400 text-sm mt-1">Enter the total number of pages in your document</p>
            </div>
            
            <!-- Color Option -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Print Type</label>
                <select 
                    name="is_color" 
                    class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    <option value="False" class="bg-slate-800">Black & White (200 UGX/page)</option>
                    <option value="True" class="bg-slate-800">Color (300 UGX/page)</option>
                </select>
            </div>
            
            <!-- Double Sided -->
            <div class="flex items-center">
                <input 
                    type="checkbox" 
                    name="is_double_sided" 
                    id="is_double_sided"
                    class="w-5 h-5 bg-white/10 border border-white/10 rounded text-blue-500 focus:ring-2 focus:ring-blue-500"
                />
                <label for="is_double_sided" class="ml-3 text-gray-300">Print double-sided (both sides of paper)</label>
            </div>
            
            <!-- Price Preview -->
            <div class="bg-blue-500/10 border border-blue-500/30 rounded-xl p-4">
                <p class="text-blue-300 text-sm">💡 Price will be calculated automatically based on your selections</p>
            </div>
            
            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 rounded-xl hover:shadow-lg hover:shadow-blue-500/30 transition-all hover:-translate-y-1"
            >
                Submit Order
            </button>
        </form>
    </div>
</div>
{% endblock %}
