{% extends 'base.html' %}

{% block title %}Upload - PrintHub{% endblock %}

{% block content %}
<div class="relative min-h-[calc(100vh-4rem)] overflow-hidden">
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <img 
            src="https://images.unsplash.com/photo-1557804506-669a67965ba0?w=1920&q=80" 
            alt="Background" 
            class="w-full h-full object-cover opacity-30"
        />
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900/90 via-slate-900/70 to-slate-900/90"></div>
    </div>

    <!-- Animated Blobs -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

    <!-- Content -->
    <div class="relative z-10 max-w-2xl mx-auto px-4 py-12">
        <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-3xl font-bold text-white text-center mb-2">Upload Your Document</h2>
            <p class="text-gray-400 text-center mb-8">We'll print it and have it ready for pickup</p>

            {% if upload_error %}
            <div class="bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-6">
                {{ upload_error }}
            </div>
            {% endif %}

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}

                <!-- File Upload -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Select File</label>
                    <div class="relative">
                        <input 
                            type="file" 
                            name="file" 
                            id="file-input"
                            class="hidden"
                            accept=".pdf,.docx,.doc,.txt,.png,.jpg,.jpeg"
                            required
                        />
                        <label 
                            for="file-input"
                            class="flex items-center justify-center w-full px-6 py-8 bg-white/10 border-2 border-dashed border-white/20 rounded-xl cursor-pointer hover:bg-white/15 hover:border-white/30 transition-all"
                        >
                            <div class="text-center">
                                <svg class="w-12 h-12 mx-auto text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <p class="text-gray-300 text-sm">Click to upload or drag and drop</p>
                                <p class="text-gray-500 text-xs mt-1">PDF, DOCX, DOC, TXT, PNG, JPG (Max 10MB)</p>
                            </div>
                        </label>
                    </div>
                    <p id="file-name" class="text-sm text-blue-400 mt-2"></p>
                </div>

                <!-- Page Count -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Number of Pages</label>
                    <input 
                        type="number" 
                        name="page_count" 
                        min="1" 
                        value="1"
                        class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    />
                </div>

                <!-- Options -->
                <div class="grid grid-cols-2 gap-4">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input 
                            type="checkbox" 
                            name="is_color" 
                            value="True"
                            class="w-5 h-5 rounded bg-white/10 border-white/20 text-blue-600 focus:ring-blue-500"
                        />
                        <span class="text-gray-300">Color Print</span>
                    </label>

                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input 
                            type="checkbox" 
                            name="is_double_sided"
                            class="w-5 h-5 rounded bg-white/10 border-white/20 text-blue-600 focus:ring-blue-500"
                        />
                        <span class="text-gray-300">Double-sided</span>
                    </label>
                </div>

                <!-- Station Selection -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Pickup Station</label>
                    <select 
                        name="station" 
                        class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                        <option value="" class="bg-slate-800">Select a station</option>
                        {% for station in stations %}
                        <option value="{{ station.id }}" class="bg-slate-800">{{ station.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-4 rounded-xl hover:shadow-lg hover:shadow-blue-500/30 transition-all hover:-translate-y-1"
                >
                    Upload & Continue
                </button>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('file-input').addEventListener('change', function(e) {
    const fileName = e.target.files[0]?.name;
    const fileNameDisplay = document.getElementById('file-name');
    if (fileName) {
        fileNameDisplay.textContent = '✓ Selected: ' + fileName;
    }
});
</script>
{% endblock %}
