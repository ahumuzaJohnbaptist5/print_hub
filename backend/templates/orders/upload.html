{% extends 'base.html' %}
{% load static %}

{% block title %}Upload Document{% endblock %}

{% block content %}
<style>
    /* Self-contained modern styling */
    .upload-container {
        max-width: 600px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .upload-container h2 {
        text-align: center;
        color: #333;
        margin-bottom: 25px;
        font-weight: 600;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #444;
        font-size: 0.95rem;
    }
    .form-control, .form-select {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.2s;
        box-sizing: border-box;
    }
    .form-control:focus, .form-select:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
    }
    .radio-group, .checkbox-group {
        display: flex;
        gap: 20px;
        margin-top: 5px;
    }
    .radio-group label, .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: normal;
        cursor: pointer;
        margin-bottom: 0;
    }
    .status-text {
        font-size: 0.85rem;
        margin-top: 6px;
        min-height: 20px;
    }
    .status-success { color: #28a745; }
    .status-error { color: #dc3545; }
    .status-info { color: #17a2b8; }
    .status-warning { color: #ffc107; }
    
    .price-display {
        background: #f8f9fa;
        border: 2px dashed #007bff;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        margin: 25px 0;
    }
    .price-display span:first-child {
        font-size: 1rem;
        color: #666;
        display: block;
        margin-bottom: 5px;
    }
    .price-display .price-amount {
        font-size: 1.8rem;
        font-weight: 700;
        color: #007bff;
    }
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: #007bff;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-submit:hover {
        background: #0056b3;
    }
    .alert-error {
        background: #f8d7da;
        color: #721c24;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        text-align: center;
    }
</style>

<div class="upload-container">
    <h2>📄 Upload Print Job</h2>

    {% if upload_error %}
        <div class="alert-error">{{ upload_error }}</div>
    {% endif %}

    <form method="post" enctype="multipart/form-data" id="upload-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="file">Select File</label>
            <input type="file" class="form-control" id="file" name="file" accept=".pdf,.docx,.doc,.txt,.png,.jpg,.jpeg" required>
            <div id="page-count-status" class="status-text">Select a file to auto-detect page count.</div>
        </div>

        <div class="form-group">
            <label for="page_count">Number of Pages</label>
            <input type="number" class="form-control" id="page_count" name="page_count" min="1" value="1" required>
        </div>

        <div class="form-group">
            <label>Print Type</label>
            <div class="radio-group">
                <label><input type="radio" class="price-trigger" name="is_color" value="False" checked> Black & White</label>
                <label><input type="radio" class="price-trigger" name="is_color" value="True"> Color</label>
            </div>
        </div>

        <div class="form-group">
            <label>Options</label>
            <div class="checkbox-group">
                <label><input type="checkbox" class="price-trigger" id="double_sided" name="is_double_sided"> Double Sided</label>
            </div>
        </div>

        <div class="form-group">
            <label for="binding">Binding / Finishing</label>
            <select class="form-select price-trigger" id="binding" name="binding">
                <option value="none" selected>No Binding</option>
                <option value="staple">Staple (Corner)</option>
                <option value="spiral">Spiral Binding (+1,000 UGX)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="station">Pickup Station</label>
            <select class="form-select" id="station" name="station" required>
                <option value="" disabled selected>Choose a station...</option>
                {% for station in stations %}
                    <option value="{{ station.id }}">{{ station.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="price-display">
            <span>Estimated Total</span>
            <div class="price-amount" id="live-price">0 UGX</div>
        </div>

        <button type="submit" class="btn-submit">Submit Order</button>
    </form>
</div>

<!-- JS Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const BASE_PRICE_BW = 200;
    const COLOR_SURCHARGE = 100;
    const SPIRAL_FEE = 1000;
    const WORDS_PER_PAGE = 500;

    const fileInput = document.getElementById('file');
    const pageCountInput = document.getElementById('page_count');
    const statusText = document.getElementById('page-count-status');
    const livePrice = document.getElementById('live-price');
    const priceTriggers = document.querySelectorAll('.price-trigger');

    function animateCountUp(target, onComplete) {
        if (target < 2) {
            pageCountInput.value = target;
            onComplete();
            return;
        }
        const duration = 1000;
        const steps = 25;
        const stepTime = duration / steps;
        const increment = target / steps;
        let current = 0;

        statusText.innerHTML = '⏳ Scanning document...';
        statusText.className = 'status-text status-info';
        pageCountInput.value = 0;

        const timer = setInterval(() => {
            current += increment;
            pageCountInput.value = Math.round(current);
            calculatePrice(); // Update price live during animation

            if (current >= target) {
                clearInterval(timer);
                pageCountInput.value = target;
                onComplete();
            }
        }, stepTime);
    }

    function countWords(str) {
        return str.trim().split(/\s+/).filter(word => word.length > 0).length;
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const ext = file.name.toLowerCase().split('.').pop();
        
        if (ext === 'pdf') {
            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    animateCountUp(pdf.numPages, () => {
                        statusText.innerText = `✅ Exact PDF page count: ${pdf.numPages} pages.`;
                        statusText.className = 'status-text status-success';
                    });
                }).catch(() => {
                    statusText.innerText = '❌ Could not read PDF. Enter manually.';
                    statusText.className = 'status-text status-error';
                    pageCountInput.value = 1;
                    calculatePrice();
                });
            };
            fileReader.readAsArrayBuffer(file);

        } else if (['png', 'jpg', 'jpeg'].includes(ext)) {
            animateCountUp(1, () => {
                statusText.innerText = '✅ Image detected. Count set to 1 page.';
                statusText.className = 'status-text status-success';
            });

        } else if (ext === 'docx') {
            const reader = new FileReader();
            reader.onload = function(event) {
                mammoth.extractRawText({arrayBuffer: event.target.result})
                    .then(function(result) {
                        const words = countWords(result.value);
                        const pages = Math.max(1, Math.ceil(words / WORDS_PER_PAGE));
                        animateCountUp(pages, () => {
                            statusText.innerText = `✅ DOCX: ~${words} words. Est. ${pages} pages.`;
                            statusText.className = 'status-text status-success';
                        });
                    })
                    .catch(() => {
                        statusText.innerText = '❌ Could not read DOCX. Enter manually.';
                        statusText.className = 'status-text status-error';
                        pageCountInput.value = 1;
                        calculatePrice();
                    });
            };
            reader.readAsArrayBuffer(file);

        } else if (ext === 'txt') {
            const reader = new FileReader();
            reader.onload = function(event) {
                const words = countWords(event.target.result);
                const pages = Math.max(1, Math.ceil(words / WORDS_PER_PAGE));
                animateCountUp(pages, () => {
                    statusText.innerText = `✅ TXT: ~${words} words. Est. ${pages} pages.`;
                    statusText.className = 'status-text status-success';
                });
            };
            reader.readAsText(file);

        } else {
            statusText.innerText = 'ℹ️ Auto-count not supported. Enter manually.';
            statusText.className = 'status-text status-warning';
            pageCountInput.value = 1;
            calculatePrice();
        }
    });

    function calculatePrice() {
        let pages = parseInt(pageCountInput.value) || 0;
        let isColor = document.querySelector('input[name="is_color"]:checked').value === 'True';
        let isDoubleSided = document.getElementById('double_sided').checked;
        let binding = document.getElementById('binding').value;

        let effectivePages = isDoubleSided ? Math.ceil(pages / 2) : pages;
        let pricePerPage = BASE_PRICE_BW + (isColor ? COLOR_SURCHARGE : 0);
        let printingCost = effectivePages * pricePerPage;
        let bindingCost = (binding === 'spiral') ? SPIRAL_FEE : 0;
        
        let total = printingCost + bindingCost;
        livePrice.innerText = `${total.toLocaleString()} UGX`;
    }

    pageCountInput.addEventListener('input', calculatePrice);
    priceTriggers.forEach(trigger => trigger.addEventListener('change', calculatePrice));
    calculatePrice();
</script>
{% endblock %}
