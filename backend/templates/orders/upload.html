{% extends 'base.html' %} {% load static %}

{% block title %}Upload Document{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="fas fa-upload me-2"></i>Upload Print Job</h3>
                </div>
                <div class="card-body">
                    {% if upload_error %}
                        <div class="alert alert-danger">{{ upload_error }}</div>
                    {% endif %}

                    <form method="post" enctype="multipart/form-data" id="upload-form">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="file" class="form-label fw-bold">Select File</label>
                            <input type="file" class="form-control" id="file" name="file" accept=".pdf,.docx,.doc,.txt,.png,.jpg,.jpeg" required>
                            <div id="page-count-status" class="form-text text-muted mt-1">Select a file to auto-detect page count.</div>
                        </div>

                        <div class="mb-3">
                            <label for="page_count" class="form-label fw-bold">Number of Pages</label>
                            <input type="number" class="form-control" id="page_count" name="page_count" min="1" value="1" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Print Type</label>
                                <div class="form-check">
                                    <input class="form-check-input price-trigger" type="radio" name="is_color" id="bw" value="False" checked>
                                    <label class="form-check-label" for="bw">Black & White</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input price-trigger" type="radio" name="is_color" id="color" value="True">
                                    <label class="form-check-label" for="color">Color</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Paper Side</label>
                                <div class="form-check">
                                    <input class="form-check-input price-trigger" type="checkbox" id="double_sided" name="is_double_sided">
                                    <label class="form-check-label" for="double_sided">Double Sided (Saves paper!)</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="binding" class="form-label fw-bold">Binding / Finishing</label>
                            <select class="form-select price-trigger" id="binding" name="binding">
                                <option value="none" selected>No Binding</option>
                                <option value="staple">Staple (Corner)</option>
                                <option value="spiral">Spiral Binding (+1,000 UGX)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="station" class="form-label fw-bold">Pickup Station</label>
                            <select class="form-select" id="station" name="station" required>
                                <option value="" disabled selected>Choose a station...</option>
                                {% for station in stations %}
                                    <option value="{{ station.id }}">{{ station.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="alert alert-secondary d-flex justify-content-between align-items-center">
                            <span class="fw-bold fs-5">Estimated Total:</span>
                            <span class="fw-bold fs-4 text-primary" id="live-price">0 UGX</span>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fs-5">Submit Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const BASE_PRICE_BW = 200;
    const COLOR_SURCHARGE = 100;
    const SPIRAL_FEE = 1000;
    const WORDS_PER_PAGE = 500;

    const fileInput = document.getElementById('file');
    const pageCountInput = document.getElementById('page_count');
    const statusText = document.getElementById('page-count-status');
    const livePrice = document.getElementById('live-price');
    const priceTriggers = document.querySelectorAll('.price-trigger');

    // 🔢 SMOOTH COUNTING ANIMATION
    function animateCountUp(target, onComplete) {
        if (target < 2) {
            pageCountInput.value = target;
            onComplete();
            return;
        }

        const duration = 1000; // 1 second animation
        const steps = 25;
        const stepTime = duration / steps;
        const increment = target / steps;
        let current = 0;

        // Show loading state
        statusText.innerHTML = '⏳ <span class="spinner-border spinner-border-sm me-1"></span> Scanning document...';
        statusText.className = 'form-text text-info mt-1';
        pageCountInput.value = 0;

        const timer = setInterval(() => {
            current += increment;
            pageCountInput.value = Math.round(current);

            if (current >= target) {
                clearInterval(timer);
                pageCountInput.value = target;
                onComplete();
            }
        }, stepTime);
    }

    function countWords(str) {
        return str.trim().split(/\s+/).filter(word => word.length > 0).length;
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const ext = file.name.toLowerCase().split('.').pop();
        
        if (ext === 'pdf') {
            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    animateCountUp(pdf.numPages, () => {
                        statusText.innerText = `✅ Exact PDF page count: ${pdf.numPages} pages.`;
                        statusText.className = 'form-text text-success mt-1';
                    });
                }).catch(() => {
                    statusText.innerText = '❌ Could not read PDF. Please enter pages manually.';
                    statusText.className = 'form-text text-danger mt-1';
                    pageCountInput.value = 1;
                    calculatePrice();
                });
            };
            fileReader.readAsArrayBuffer(file);

        } else if (['png', 'jpg', 'jpeg'].includes(ext)) {
            animateCountUp(1, () => {
                statusText.innerText = '✅ Image detected. Count set to 1 page.';
                statusText.className = 'form-text text-success mt-1';
            });

        } else if (ext === 'docx') {
            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                mammoth.extractRawText({arrayBuffer})
                    .then(function(result) {
                        const words = countWords(result.value);
                        const pages = Math.max(1, Math.ceil(words / WORDS_PER_PAGE));
                        animateCountUp(pages, () => {
                            statusText.innerText = `✅ DOCX detected ~${words} words. Estimated ${pages} pages.`;
                            statusText.className = 'form-text text-success mt-1';
                        });
                    })
                    .catch(() => {
                        statusText.innerText = '❌ Could not read DOCX. Please enter pages manually.';
                        statusText.className = 'form-text text-danger mt-1';
                        pageCountInput.value = 1;
                        calculatePrice();
                    });
            };
            reader.readAsArrayBuffer(file);

        } else if (ext === 'txt') {
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const words = countWords(text);
                const pages = Math.max(1, Math.ceil(words / WORDS_PER_PAGE));
                animateCountUp(pages, () => {
                    statusText.innerText = `✅ TXT detected ~${words} words. Estimated ${pages} pages.`;
                    statusText.className = 'form-text text-success mt-1';
                });
            };
            reader.readAsText(file);

        } else {
            statusText.innerText = 'ℹ️ Auto-count not supported for .doc files. Please enter page count manually.';
            statusText.className = 'form-text text-warning mt-1';
            pageCountInput.value = 1;
            calculatePrice();
        }
    });

    function calculatePrice() {
        let pages = parseInt(pageCountInput.value) || 0;
        let isColor = document.getElementById('color').checked;
        let isDoubleSided = document.getElementById('double_sided').checked;
        let binding = document.getElementById('binding').value;

        let effectivePages = isDoubleSided ? Math.ceil(pages / 2) : pages;
        let pricePerPage = BASE_PRICE_BW + (isColor ? COLOR_SURCHARGE : 0);
        let printingCost = effectivePages * pricePerPage;
        let bindingCost = (binding === 'spiral') ? SPIRAL_FEE : 0;
        
        let total = printingCost + bindingCost;
        livePrice.innerText = `${total.toLocaleString()} UGX`;
    }

    pageCountInput.addEventListener('input', calculatePrice);
    priceTriggers.forEach(trigger => trigger.addEventListener('change', calculatePrice));
    calculatePrice();
</script>
{% endblock %}
