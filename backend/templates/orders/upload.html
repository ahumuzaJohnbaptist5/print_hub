{% extends 'base.html' %}
{% load static %}

{% block title %}Upload Document - PrintHub{% endblock %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>

<div class="max-w-2xl mx-auto px-4 py-8 sm:py-12">
    
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Upload Print Job</h1>
        <p class="text-gray-400">Fast, easy, and transparent pricing</p>
    </div>

    <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl p-6 sm:p-8">
        
        {% if upload_error %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl mb-6 text-sm">
                {{ upload_error }}
            </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" id="upload-form">
            {% csrf_token %}
            
            <!-- File Upload with Drag & Drop -->
            <div class="mb-6">
                <label id="dropzone" class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-white/20 rounded-2xl cursor-pointer bg-white/5 hover:bg-white/10 transition-all duration-200 group">
                    <svg id="dropzone-icon" class="w-12 h-12 text-gray-400 group-hover:scale-110 group-hover:text-indigo-400 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <span class="text-sm text-gray-300 font-semibold mt-2" id="dropzone-text">Drag & drop your file here or click to browse</span>
                    <span class="text-xs text-gray-500 mt-1">PDF, PPTX, DOCX, TXT, PNG, JPG (Max 10MB)</span>
                    <input type="file" class="hidden" id="file" name="file" accept=".pdf,.pptx,.docx,.doc,.txt,.png,.jpg,.jpeg" required>
                </label>
                <div id="page-count-status" class="text-sm mt-2 text-gray-400 text-center h-5"></div>
            </div>

            <!-- Preview -->
            <div id="preview-container" class="mb-6 hidden">
                <label class="block text-sm font-bold text-gray-300 mb-2">Document Preview</label>
                <div id="preview-content" class="border border-white/10 rounded-xl p-4 bg-white/5 max-h-80 overflow-auto"></div>
            </div>

            <!-- Page Count -->
            <div class="mb-6">
                <label for="page_count" class="block text-sm font-bold text-gray-300 mb-2">Number of Pages / Slides</label>
                <input type="number" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-500" id="page_count" name="page_count" min="1" value="1" required>
            </div>

            <!-- Print Options -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-bold text-gray-300 mb-2">Print Type</label>
                    <div class="space-y-2">
                        <label class="flex items-center p-3 border border-white/10 rounded-xl cursor-pointer hover:bg-white/5 transition-colors has-[:checked]:bg-indigo-500/10 has-[:checked]:border-indigo-500/50">
                            <input type="radio" class="price-trigger h-4 w-4 text-indigo-500" name="is_color" value="False" checked>
                            <span class="ml-3 text-sm font-medium text-gray-300">Black & White</span>
                        </label>
                        <label class="flex items-center p-3 border border-white/10 rounded-xl cursor-pointer hover:bg-white/5 transition-colors has-[:checked]:bg-indigo-500/10 has-[:checked]:border-indigo-500/50">
                            <input type="radio" class="price-trigger h-4 w-4 text-indigo-500" name="is_color" value="True">
                            <span class="ml-3 text-sm font-medium text-gray-300">Color</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-300 mb-2">Paper Options</label>
                    <label class="flex items-center p-3 border border-white/10 rounded-xl cursor-pointer hover:bg-white/5 transition-colors has-[:checked]:bg-indigo-500/10 has-[:checked]:border-indigo-500/50 h-full">
                        <input type="checkbox" class="price-trigger h-4 w-4 text-indigo-500 rounded" id="double_sided" name="is_double_sided">
                        <span class="ml-3 text-sm font-medium text-gray-300">Double Sided</span>
                    </label>
                </div>
            </div>

            <!-- Binding -->
            <div class="mb-6">
                <label for="binding" class="block text-sm font-bold text-gray-300 mb-2">Binding / Finishing</label>
                <select class="price-trigger w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" id="binding" name="binding">
                    <option value="none" selected>No Binding</option>
                    <option value="staple">Staple (Corner)</option>
                    <option value="spiral">Spiral Binding (+1,000 UGX)</option>
                </select>
            </div>

            <!-- Station -->
            <div class="mb-6">
                <label for="station" class="block text-sm font-bold text-gray-300 mb-2">Printing Station</label>
                <select class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" id="station" name="station" required>
                    <option value="" disabled selected>Where should we print it?</option>
                    {% for station in stations %}
                        <option value="{{ station.id }}">{{ station.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Delivery -->
            <div class="mb-6 bg-white/5 rounded-2xl p-5 border border-white/10">
                <label class="block text-sm font-bold text-gray-300 mb-3">How do you want to get it?</label>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <label class="flex items-center justify-center p-3 border-2 border-white/10 rounded-xl cursor-pointer hover:border-indigo-500/50 transition-all has-[:checked]:bg-indigo-500/10 has-[:checked]:border-indigo-500">
                        <input type="radio" class="delivery-trigger h-4 w-4 text-indigo-500" name="delivery_type" value="pickup" checked>
                        <span class="ml-2 text-sm font-semibold text-gray-300">Pickup (Free)</span>
                    </label>
                    <label class="flex items-center justify-center p-3 border-2 border-white/10 rounded-xl cursor-pointer hover:border-indigo-500/50 transition-all has-[:checked]:bg-indigo-500/10 has-[:checked]:border-indigo-500">
                        <input type="radio" class="delivery-trigger h-4 w-4 text-indigo-500" name="delivery_type" value="delivery">
                        <span class="ml-2 text-sm font-semibold text-gray-300">Deliver to Me</span>
                    </label>
                </div>
                <div id="delivery-zone-container" class="hidden transition-all">
                    <label for="delivery_zone" class="block text-sm font-medium text-gray-400 mb-1">Select your delivery zone:</label>
                    <select class="price-trigger w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" id="delivery_zone" name="delivery_zone">
                        <option value="" disabled selected>Choose a zone...</option>
                        {% for zone in delivery_zones %}
                            <option value="{{ zone.id }}" data-fee="{{ zone.delivery_fee }}">{{ zone.name }} (+{{ zone.delivery_fee|default:0 }} UGX)</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Discount -->
            <div class="mb-6">
                <label for="discount_code" class="block text-sm font-bold text-gray-300 mb-2">Discount Code <span class="text-gray-500 font-normal">(Optional)</span></label>
                <div class="flex gap-2">
                    <input type="text" class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 uppercase placeholder-gray-500" id="discount_code" name="discount_code" placeholder="Enter code (e.g., WELCOME10)" style="text-transform: uppercase;">
                    <button type="button" id="apply-discount" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all">Apply</button>
                </div>
                <div id="discount-message" class="text-sm mt-2 hidden"></div>
                <input type="hidden" id="discount_amount" name="discount_amount" value="0">
            </div>

            <!-- Notes -->
            <div class="mb-6">
                <label for="notes" class="block text-sm font-bold text-gray-300 mb-2">Special Instructions <span class="text-gray-500 font-normal">(Optional)</span></label>
                <textarea class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-500" id="notes" name="notes" rows="3" placeholder="Any special instructions for your print job?"></textarea>
            </div>

            <!-- Price -->
            <div class="bg-gradient-to-r from-indigo-500/10 to-purple-500/10 border border-indigo-500/20 rounded-2xl p-6 text-center mb-8">
                <p class="text-sm font-bold text-indigo-400 uppercase tracking-wider">Estimated Total</p>
                <p class="text-4xl font-extrabold text-white mt-2 transition-all" id="live-price">0 UGX</p>
                <p class="text-xs text-gray-500 mt-1" id="price-note"></p>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 text-lg">
                Submit Order - <span id="submit-price">0 UGX</span>
            </button>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const BASE_PRICE_BW = {{ base_price_bw|default:200 }};
    const COLOR_SURCHARGE = {{ color_surcharge|default:100 }};
    const SPIRAL_FEE = {{ spiral_binding_fee|default:1000 }};
    const WORDS_PER_PAGE = 500;

    const dropzone = document.getElementById('dropzone');
    const dropzoneText = document.getElementById('dropzone-text');
    const dropzoneIcon = document.getElementById('dropzone-icon');
    const fileInput = document.getElementById('file');
    const pageCountInput = document.getElementById('page_count');
    const statusText = document.getElementById('page-count-status');
    const livePrice = document.getElementById('live-price');
    const submitPrice = document.getElementById('submit-price');
    const priceTriggers = document.querySelectorAll('.price-trigger');
    const previewContainer = document.getElementById('preview-container');
    const previewContent = document.getElementById('preview-content');
    const deliveryTriggers = document.querySelectorAll('.delivery-trigger');
    const deliveryZoneContainer = document.getElementById('delivery-zone-container');
    const deliveryZoneSelect = document.getElementById('delivery_zone');
    const discountCodeInput = document.getElementById('discount_code');
    const applyDiscountBtn = document.getElementById('apply-discount');
    const discountMessage = document.getElementById('discount-message');
    const discountAmountInput = document.getElementById('discount_amount');
    
    let discountApplied = false;
    let discountValue = 0;

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    ['dragenter', 'dragover'].forEach(eventName => dropzone.addEventListener(eventName, highlight, false));
    ['dragleave', 'drop'].forEach(eventName => dropzone.addEventListener(eventName, unhighlight, false));

    function highlight(e) {
        dropzone.classList.add('border-indigo-400', 'bg-indigo-500/10');
        dropzoneIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
        dropzoneText.innerText = 'Drop your file here';
    }

    function unhighlight(e) {
        dropzone.classList.remove('border-indigo-400', 'bg-indigo-500/10');
        dropzoneIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>';
        dropzoneText.innerText = fileInput.files.length > 0 ? fileInput.files[0].name : 'Drag & drop your file here or click to browse';
    }

    dropzone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const files = e.dataTransfer.files;
        if (files.length > 0) { fileInput.files = files; handleFileSelect(files[0]); }
    }

    deliveryTriggers.forEach(trigger => {
        trigger.addEventListener('change', function() {
            if (this.value === 'delivery') deliveryZoneContainer.classList.remove('hidden');
            else { deliveryZoneContainer.classList.add('hidden'); deliveryZoneSelect.value = ''; }
            calculatePrice();
        });
    });

    fileInput.addEventListener('change', function() { if (this.files.length > 0) handleFileSelect(this.files[0]); });

    function handleFileSelect(file) { dropzoneText.innerText = file.name; dropzoneText.classList.add('font-bold'); clearPreview(); processFile(file); }
    function clearPreview() { previewContent.innerHTML = ''; previewContainer.classList.add('hidden'); }
    function showPreview(htmlContent) { previewContent.innerHTML = htmlContent; previewContainer.classList.remove('hidden'); }

    function animateCountUp(target, onComplete) {
        if (target < 2) { pageCountInput.value = target; calculatePrice(); if(onComplete) onComplete(); return; }
        const duration = 1000, steps = 25, stepTime = duration / steps, increment = target / steps;
        let current = 0;
        statusText.innerHTML = 'Scanning document...'; statusText.className = 'text-sm mt-2 text-blue-400 text-center h-5 font-medium';
        pageCountInput.value = 0;
        const timer = setInterval(() => {
            current += increment; pageCountInput.value = Math.round(current); calculatePrice();
            if (current >= target) { clearInterval(timer); pageCountInput.value = target; if(onComplete) onComplete(); }
        }, stepTime);
    }

    function countWords(str) { return str.trim().split(/\s+/).filter(word => word.length > 0).length; }

    function processFile(file) {
        const ext = file.name.toLowerCase().split('.').pop();
        const fileURL = URL.createObjectURL(file);
        if (['png', 'jpg', 'jpeg'].includes(ext)) showPreview('<img src="'+fileURL+'" class="max-h-64 rounded-lg shadow-md mx-auto block">');
        else if (ext === 'pdf') showPreview('<iframe src="'+fileURL+'" class="w-full h-64 rounded-lg shadow-md border border-white/10 bg-white"></iframe>');
        else if (ext === 'txt') { const r = new FileReader(); r.onload = (ev) => showPreview('<pre class="text-sm text-gray-300 whitespace-pre-wrap font-mono">'+ev.target.result.replace(/</g, "&lt;")+'</pre>'); r.readAsText(file); }
        else if (ext === 'docx') { const r = new FileReader(); r.onload = (ev) => mammoth.convertToHtml({arrayBuffer: ev.target.result}).then(res => showPreview('<div class="prose prose-sm max-w-none text-gray-300">'+res.value+'</div>')); r.readAsArrayBuffer(file); }

        if (ext === 'pdf') {
            const r = new FileReader(); 
            r.onload = function() { pdfjsLib.getDocument(new Uint8Array(this.result)).promise.then(pdf => animateCountUp(pdf.numPages, () => { statusText.innerText = 'PDF: '+pdf.numPages+' pages'; statusText.className = 'text-sm mt-2 text-green-400 text-center h-5 font-medium'; })); }; 
            r.readAsArrayBuffer(file);
        } else if (['png', 'jpg', 'jpeg'].includes(ext)) {
            animateCountUp(1, () => { statusText.innerText = 'Image: 1 page'; statusText.className = 'text-sm mt-2 text-green-400 text-center h-5 font-medium'; });
        } else if (ext === 'pptx') {
            const reader = new FileReader();
            reader.onload = function(event) {
                JSZip.loadAsync(event.target.result).then(function(zip) {
                    let slideCount = 0;
                    zip.forEach(function(relativePath, zipEntry) { if (zipEntry.name.match(/ppt\/slides\/slide\d+\.xml$/)) slideCount++; });
                    if (slideCount > 0) animateCountUp(slideCount, () => { statusText.innerText = 'PPTX: '+slideCount+' slides'; statusText.className = 'text-sm mt-2 text-green-400 text-center h-5 font-medium'; });
                    else { statusText.innerText = 'Could not read PPTX'; statusText.className = 'text-sm mt-2 text-red-400 text-center h-5 font-medium'; pageCountInput.value = 1; calculatePrice(); }
                }).catch(() => { statusText.innerText = 'Could not read PPTX'; pageCountInput.value = 1; calculatePrice(); });
            };
            reader.readAsArrayBuffer(file);
        } else if (ext === 'docx') {
            const r = new FileReader(); 
            r.onload = (ev) => mammoth.extractRawText({arrayBuffer: ev.target.result}).then(res => { const p = Math.max(1, Math.ceil(countWords(res.value)/WORDS_PER_PAGE)); animateCountUp(p, () => { statusText.innerText = 'DOCX: ~'+p+' pages'; statusText.className = 'text-sm mt-2 text-green-400 text-center h-5 font-medium'; }); }); 
            r.readAsArrayBuffer(file);
        } else if (ext === 'txt') {
            const r = new FileReader(); 
            r.onload = (ev) => { const p = Math.max(1, Math.ceil(countWords(ev.target.result)/WORDS_PER_PAGE)); animateCountUp(p, () => { statusText.innerText = 'TXT: ~'+p+' pages'; statusText.className = 'text-sm mt-2 text-green-400 text-center h-5 font-medium'; }); }; 
            r.readAsText(file);
        } else { statusText.innerText = 'Enter pages manually'; pageCountInput.value = 1; calculatePrice(); }
    }

    function calculatePrice() {
        let pages = parseInt(pageCountInput.value) || 0;
        let isColor = document.querySelector('input[name="is_color"]:checked').value === 'True';
        let isDoubleSided = document.getElementById('double_sided').checked;
        let binding = document.getElementById('binding').value;
        let deliveryType = document.querySelector('input[name="delivery_type"]:checked').value;
        let deliveryFee = 0;
        if (deliveryType === 'delivery') {
            const selectedOption = deliveryZoneSelect.options[deliveryZoneSelect.selectedIndex];
            if (selectedOption) deliveryFee = parseInt(selectedOption.getAttribute('data-fee')) || 0;
        }
        let effectivePages = isDoubleSided ? Math.ceil(pages / 2) : pages;
        let total = effectivePages * (BASE_PRICE_BW + (isColor ? COLOR_SURCHARGE : 0)) + (binding === 'spiral' ? SPIRAL_FEE : 0) + deliveryFee;
        if (discountApplied && discountValue > 0) total = Math.max(0, total - discountValue);
        livePrice.innerText = total.toLocaleString() + ' UGX';
        submitPrice.innerText = total.toLocaleString() + ' UGX';
        document.getElementById('price-note').innerText = (isDoubleSided && pages > 1) ? 'Saves '+(pages-effectivePages)+' sheet(s)' : '';
    }

    applyDiscountBtn.addEventListener('click', function() {
        const code = discountCodeInput.value.trim().toUpperCase();
        if (!code) { showDiscountMessage('Please enter a discount code.', 'error'); return; }
        fetch('{% url "validate_discount_code" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value },
            body: 'code='+encodeURIComponent(code)+'&order_total='+calculateRawTotal()
        })
        .then(r => r.json())
        .then(data => {
            if (data.valid) {
                discountApplied = true; discountValue = data.savings; discountAmountInput.value = data.savings;
                showDiscountMessage(data.description || 'Discount applied! Save '+data.savings.toLocaleString()+' UGX', 'success');
                applyDiscountBtn.innerText = 'Remove'; applyDiscountBtn.classList.add('bg-red-600', 'hover:bg-red-700');
            } else showDiscountMessage(data.error, 'error');
            calculatePrice();
        }).catch(() => showDiscountMessage('Error validating code.', 'error'));
    });

    function calculateRawTotal() {
        let pages = parseInt(pageCountInput.value) || 0;
        let isColor = document.querySelector('input[name="is_color"]:checked').value === 'True';
        let isDoubleSided = document.getElementById('double_sided').checked;
        let binding = document.getElementById('binding').value;
        return Math.ceil(pages / (isDoubleSided ? 2 : 1)) * (BASE_PRICE_BW + (isColor ? COLOR_SURCHARGE : 0)) + (binding === 'spiral' ? SPIRAL_FEE : 0);
    }

    function showDiscountMessage(message, type) {
        discountMessage.innerText = message; discountMessage.classList.remove('hidden');
        discountMessage.className = 'text-sm mt-2 '+(type==='success'?'text-green-400':'text-red-400')+' font-medium';
    }

    pageCountInput.addEventListener('input', calculatePrice);
    priceTriggers.forEach(trigger => trigger.addEventListener('change', calculatePrice));
    calculatePrice();
</script>
{% endblock %}
