{% extends 'base.html' %}
{% load static %}

{% block title %}Upload Document{% endblock %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>

<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
        
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-8 py-8 text-center">
            <h2 class="text-3xl font-bold text-white">✨ Upload Print Job</h2>
            <p class="text-indigo-100 mt-2">Fast, easy, and transparent pricing</p>
        </div>

        <div class="px-8 py-10">
            {% if upload_error %}
                <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-6 rounded-r-lg">
                    <p class="text-red-700 text-sm font-medium">{{ upload_error }}</p>
                </div>
            {% endif %}

            <form method="post" enctype="multipart/form-data" id="upload-form">
                {% csrf_token %}
                
                <!-- 1. File Upload -->
                <div class="mb-6">
                    <label class="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-indigo-300 rounded-2xl cursor-pointer bg-indigo-50 hover:bg-indigo-100 transition-all duration-200 group">
                        <svg class="w-10 h-10 text-indigo-400 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <span class="text-sm text-indigo-600 font-semibold mt-2" id="dropzone-text">Click to upload your document</span>
                        <span class="text-xs text-gray-500 mt-1">PDF, PPTX, DOCX, TXT, PNG, JPG (Max 10MB)</span>
                        <!-- Added .pptx to accept -->
                        <input type="file" class="hidden" id="file" name="file" accept=".pdf,.pptx,.docx,.doc,.txt,.png,.jpg,.jpeg" required>
                    </label>
                    <div id="page-count-status" class="text-sm mt-2 text-gray-500 text-center h-5"></div>
                </div>

                <!-- 2. Preview -->
                <div id="preview-container" class="mb-6 hidden">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Document Preview</label>
                    <div id="preview-content" class="border border-gray-200 rounded-xl p-4 bg-gray-50 max-h-80 overflow-auto shadow-inner"></div>
                </div>

                <!-- 3. Page Count -->
                <div class="mb-6">
                    <label for="page_count" class="block text-sm font-bold text-gray-700 mb-2">Number of Pages / Slides</label>
                    <input type="number" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none text-gray-700" id="page_count" name="page_count" min="1" value="1" required>
                </div>

                <!-- 4. Print Options -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Print Type</label>
                        <div class="space-y-2">
                            <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-indigo-50 transition-colors has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400">
                                <input type="radio" class="price-trigger h-4 w-4 text-indigo-600" name="is_color" value="False" checked>
                                <span class="ml-3 text-sm font-medium text-gray-700">Black & White</span>
                            </label>
                            <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-indigo-50 transition-colors has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400">
                                <input type="radio" class="price-trigger h-4 w-4 text-indigo-600" name="is_color" value="True">
                                <span class="ml-3 text-sm font-medium text-gray-700">Color 🎨</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Paper Options</label>
                        <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-indigo-50 transition-colors has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 h-full">
                            <input type="checkbox" class="price-trigger h-4 w-4 text-indigo-600 rounded" id="double_sided" name="is_double_sided">
                            <span class="ml-3 text-sm font-medium text-gray-700">Double Sided 📄</span>
                        </label>
                    </div>
                </div>

                <!-- 5. Binding -->
                <div class="mb-6">
                    <label for="binding" class="block text-sm font-bold text-gray-700 mb-2">Binding / Finishing</label>
                    <select class="price-trigger w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-gray-700 bg-white" id="binding" name="binding">
                        <option value="none" selected>No Binding</option>
                        <option value="staple">Staple (Corner)</option>
                        <option value="spiral">Spiral Binding (+1,000 UGX)</option>
                    </select>
                </div>

                <!-- 6. Station Selection -->
                <div class="mb-6">
                    <label for="station" class="block text-sm font-bold text-gray-700 mb-2">Printing Station</label>
                    <select class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-gray-700 bg-white" id="station" name="station" required>
                        <option value="" disabled selected>Where should we print it?</option>
                        {% for station in stations %}
                            <option value="{{ station.id }}">{{ station.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- 7. Delivery Options -->
                <div class="mb-6 bg-gray-50 p-5 rounded-2xl border border-gray-200">
                    <label class="block text-sm font-bold text-gray-700 mb-3">How do you want to get it?</label>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <label class="flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-indigo-400 transition-all has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-500">
                            <input type="radio" class="delivery-trigger h-4 w-4 text-indigo-600" name="delivery_type" value="pickup" checked>
                            <span class="ml-2 text-sm font-semibold text-gray-700">🏃 Pickup (Free)</span>
                        </label>
                        <label class="flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-indigo-400 transition-all has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-500">
                            <input type="radio" class="delivery-trigger h-4 w-4 text-indigo-600" name="delivery_type" value="delivery">
                            <span class="ml-2 text-sm font-semibold text-gray-700">🚚 Deliver to Me</span>
                        </label>
                    </div>

                    <div id="delivery-zone-container" class="hidden transition-all">
                        <label for="delivery_zone" class="block text-sm font-medium text-gray-600 mb-1">Select your delivery zone:</label>
                        <select class="price-trigger w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-gray-700 bg-white" id="delivery_zone" name="delivery_zone">
                            <option value="" disabled selected>Choose a zone...</option>
                            {% for zone in delivery_zones %}
                                <option value="{{ zone.id }}" data-fee="{{ zone.delivery_fee }}">
                                    {{ zone.name }} (+{{ zone.delivery_fee|default:0 }} UGX)
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 8. Live Price Display -->
                <div class="bg-gradient-to-r from-indigo-50 to-purple-50 border-2 border-dashed border-indigo-200 rounded-2xl p-6 text-center mb-8">
                    <p class="text-sm font-bold text-indigo-600 uppercase tracking-wider">Estimated Total</p>
                    <p class="text-4xl font-extrabold text-gray-800 mt-2 transition-all" id="live-price">0 UGX</p>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 text-lg">
                    🚀 Submit Order
                </button>
            </form>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<!-- NEW: JSZip for reading PPTX files -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const BASE_PRICE_BW = 200;
    const COLOR_SURCHARGE = 100;
    const SPIRAL_FEE = 1000;
    const WORDS_PER_PAGE = 500;

    const fileInput = document.getElementById('file');
    const dropzoneText = document.getElementById('dropzone-text');
    const pageCountInput = document.getElementById('page_count');
    const statusText = document.getElementById('page-count-status');
    const livePrice = document.getElementById('live-price');
    const priceTriggers = document.querySelectorAll('.price-trigger');
    
    const previewContainer = document.getElementById('preview-container');
    const previewContent = document.getElementById('preview-content');

    const deliveryTriggers = document.querySelectorAll('.delivery-trigger');
    const deliveryZoneContainer = document.getElementById('delivery-zone-container');
    const deliveryZoneSelect = document.getElementById('delivery_zone');

    deliveryTriggers.forEach(trigger => {
        trigger.addEventListener('change', function() {
            if (this.value === 'delivery') deliveryZoneContainer.classList.remove('hidden');
            else { deliveryZoneContainer.classList.add('hidden'); deliveryZoneSelect.value = ''; }
            calculatePrice();
        });
    });

    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            dropzoneText.innerText = `📎 ${this.files[0].name}`;
            dropzoneText.classList.add('font-bold');
        }
    });

    function clearPreview() { previewContent.innerHTML = ''; previewContainer.classList.add('hidden'); }
    function showPreview(htmlContent) { previewContent.innerHTML = htmlContent; previewContainer.classList.remove('hidden'); }

    function animateCountUp(target, onComplete) {
        if (target < 2) { pageCountInput.value = target; calculatePrice(); onComplete(); return; }
        const duration = 1000, steps = 25, stepTime = duration / steps, increment = target / steps;
        let current = 0;
        statusText.innerHTML = '⏳ Scanning document...';
        statusText.className = 'text-sm mt-2 text-blue-500 text-center h-5 font-medium';
        pageCountInput.value = 0;
        const timer = setInterval(() => {
            current += increment;
            pageCountInput.value = Math.round(current);
            calculatePrice();
            if (current >= target) { clearInterval(timer); pageCountInput.value = target; onComplete(); }
        }, stepTime);
    }

    function countWords(str) { return str.trim().split(/\s+/).filter(word => word.length > 0).length; }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        clearPreview();
        const ext = file.name.toLowerCase().split('.').pop();
        const fileURL = URL.createObjectURL(file);

        // ==========================================
        // --- PREVIEW LOGIC ---
        // ==========================================
        if (['png', 'jpg', 'jpeg'].includes(ext)) {
            showPreview(`<img src="${fileURL}" class="max-h-64 rounded-lg shadow-md mx-auto block">`);
        } else if (ext === 'pdf') {
            showPreview(`<iframe src="${fileURL}" class="w-full h-64 rounded-lg shadow-md border bg-white"></iframe>`);
        } else if (ext === 'txt') {
            const r = new FileReader(); 
            r.onload = (ev) => showPreview(`<pre class="text-sm text-gray-700 whitespace-pre-wrap font-mono">${ev.target.result.replace(/</g, "&lt;")}</pre>`); 
            r.readAsText(file);
        } else if (ext === 'docx') {
            const r = new FileReader(); 
            r.onload = (ev) => mammoth.convertToHtml({arrayBuffer: ev.target.result}).then(res => showPreview(`<div class="prose prose-sm max-w-none text-gray-700">${res.value}</div>`)); 
            r.readAsArrayBuffer(file);
        } 
        // --- NEW: PPTX PREVIEW (Extracts text from slides) ---
        else if (ext === 'pptx') {
            const reader = new FileReader();
            reader.onload = function(event) {
                JSZip.loadAsync(event.target.result).then(function(zip) {
                    let slideTexts = [];
                    const promises = [];
                    
                    // Extract text from first 3 slides for preview
                    for (let i = 1; i <= 3; i++) {
                        const slideFile = zip.file(`ppt/slides/slide${i}.xml`);
                        if (slideFile) {
                            promises.push(
                                slideFile.async("string").then(content => {
                                    // Extract text between <a:t> tags
                                    const matches = content.match(/<a:t>([^<]*)<\/a:t>/g);
                                    if (matches) {
                                        const text = matches.map(m => m.replace(/<\/?a:t>/g, '')).join(' ');
                                        slideTexts.push(`<div class="mb-3 pb-3 border-b border-gray-200"><span class="font-bold text-indigo-600 text-xs uppercase">Slide ${i}</span><p class="text-sm text-gray-700 mt-1">${text}</p></div>`);
                                    }
                                })
                            );
                        }
                    }
                    
                    Promise.all(promises).then(() => {
                        if (slideTexts.length > 0) {
                            showPreview(`<div class="bg-white p-4 rounded-lg text-left">${slideTexts.join('')}<p class="text-xs text-gray-400 text-center mt-2">Showing text from first ${slideTexts.length} slides...</p></div>`);
                        } else {
                            showPreview(`<div class="text-center py-8 text-gray-500"><p class="font-bold text-lg">PowerPoint Presentation</p><p>No text could be extracted.</p></div>`);
                        }
                    });
                }).catch(() => {
                    showPreview(`<div class="text-center py-8 text-gray-500"><p class="font-bold text-lg">PowerPoint Presentation</p><p>Could not read file.</p></div>`);
                });
            };
            reader.readAsArrayBuffer(file);
        }

        // ==========================================
        // --- PAGE COUNTING LOGIC ---
        // ==========================================
        if (ext === 'pdf') {
            const r = new FileReader(); 
            r.onload = function() { 
                pdfjsLib.getDocument(new Uint8Array(this.result)).promise.then(pdf => animateCountUp(pdf.numPages, () => { 
                    statusText.innerText = `✅ Exact PDF: ${pdf.numPages} pages.`; 
                    statusText.className = 'text-sm mt-2 text-green-600 text-center h-5 font-medium'; 
                })); 
            }; 
            r.readAsArrayBuffer(file);
        } else if (['png', 'jpg', 'jpeg'].includes(ext)) {
            animateCountUp(1, () => { 
                statusText.innerText = '✅ Image: 1 page.'; 
                statusText.className = 'text-sm mt-2 text-green-600 text-center h-5 font-medium'; 
            });
        } 
        // --- NEW: PPTX SLIDE COUNTING (100% Accurate) ---
        else if (ext === 'pptx') {
            const reader = new FileReader();
            reader.onload = function(event) {
                JSZip.loadAsync(event.target.result).then(function(zip) {
                    let slideCount = 0;
                    // Count exactly how many slide XML files exist in the ZIP
                    zip.forEach(function (relativePath, zipEntry) {
                        if (zipEntry.name.match(/ppt\/slides\/slide\d+\.xml$/)) {
                            slideCount++;
                        }
                    });
                    
                    if (slideCount > 0) {
                        animateCountUp(slideCount, () => {
                            statusText.innerText = `✅ Exact PPTX: ${slideCount} slides.`;
                            statusText.className = 'text-sm mt-2 text-green-600 text-center h-5 font-medium';
                        });
                    } else {
                        throw new Error("No slides found");
                    }
                }).catch(() => {
                    statusText.innerText = '❌ Could not read PPTX. Enter manually.';
                    statusText.className = 'text-sm mt-2 text-red-500 text-center h-5 font-medium';
                    pageCountInput.value = 1;
                    calculatePrice();
                });
            };
            reader.readAsArrayBuffer(file);
        } 
        else if (ext === 'docx') {
            const r = new FileReader(); 
            r.onload = (ev) => mammoth.extractRawText({arrayBuffer: ev.target.result}).then(res => { 
                const p = Math.max(1, Math.ceil(countWords(res.value)/WORDS_PER_PAGE)); 
                animateCountUp(p, () => { 
                    statusText.innerText = `✅ DOCX: Est. ${p} pages.`; 
                    statusText.className = 'text-sm mt-2 text-green-600 text-center h-5 font-medium'; 
                }); 
            }); 
            r.readAsArrayBuffer(file);
        } else if (ext === 'txt') {
            const r = new FileReader(); 
            r.onload = (ev) => { 
                const p = Math.max(1, Math.ceil(countWords(ev.target.result)/WORDS_PER_PAGE)); 
                animateCountUp(p, () => { 
                    statusText.innerText = `✅ TXT: Est. ${p} pages.`; 
                    statusText.className = 'text-sm mt-2 text-green-600 text-center h-5 font-medium'; 
                }); 
            }; 
            r.readAsText(file);
        } else {
            statusText.innerText = 'ℹ️ Enter pages manually.'; 
            statusText.className = 'text-sm mt-2 text-yellow-600 text-center h-5 font-medium'; 
            pageCountInput.value = 1; 
            calculatePrice();
        }
    });

    // 💰 LIVE PRICE CALCULATOR
    function calculatePrice() {
        let pages = parseInt(pageCountInput.value) || 0;
        let isColor = document.querySelector('input[name="is_color"]:checked').value === 'True';
        let isDoubleSided = document.getElementById('double_sided').checked;
        let binding = document.getElementById('binding').value;
        
        let deliveryType = document.querySelector('input[name="delivery_type"]:checked').value;
        let deliveryFee = 0;
        if (deliveryType === 'delivery') {
            const selectedOption = deliveryZoneSelect.options[deliveryZoneSelect.selectedIndex];
            deliveryFee = parseInt(selectedOption.getAttribute('data-fee')) || 0;
        }

        let effectivePages = isDoubleSided ? Math.ceil(pages / 2) : pages;
        let pricePerPage = BASE_PRICE_BW + (isColor ? COLOR_SURCHARGE : 0);
        let printingCost = effectivePages * pricePerPage;
        let bindingCost = (binding === 'spiral') ? SPIRAL_FEE : 0;
        
        let total = printingCost + bindingCost + deliveryFee;
        livePrice.innerText = `${total.toLocaleString()} UGX`;
    }

    pageCountInput.addEventListener('input', calculatePrice);
    priceTriggers.forEach(trigger => trigger.addEventListener('change', calculatePrice));
    calculatePrice();
</script>
{% endblock %}
