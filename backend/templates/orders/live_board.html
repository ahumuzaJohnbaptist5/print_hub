<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Board - PrintHub</title>
    <meta http-equiv="refresh" content="300">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 2px solid #334155;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.5em;
        }
        
        .header-status {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85em;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.active { background: #22c55e; }
        .status-dot.paused { background: #ef4444; }
        
        .status-dot.idle { background: #f59e0b; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 12px 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            font-size: 0.8em;
            flex-wrap: wrap;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-value {
            font-weight: bold;
            color: #fbbf24;
        }
        
        /* Pause Banner */
        .pause-banner {
            background: #7f1d1d;
            color: #fca5a5;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.9em;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0.7; }
        }
        
        /* Table */
        .table-container {
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        th {
            background-color: #0f172a;
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
            padding: 14px 16px;
            text-align: left;
            border-bottom: 2px solid #334155;
        }
        
        td {
            padding: 14px 16px;
            border-bottom: 1px solid #1e293b;
            font-size: 0.95em;
        }
        
        tr:hover td {
            background-color: rgba(251, 191, 36, 0.03);
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        /* Priority Colors */
        .priority-normal { color: #22c55e; }
        .priority-high { color: #fbbf24; }
        .priority-urgent { color: #f97316; }
        .priority-critical { color: #ef4444; animation: blink 1s infinite; }
        .priority-overdue { color: #dc2626; animation: blink 0.5s infinite; font-weight: bold; }
        .priority-postponed { color: #a855f7; }
        .priority-cancelled { color: #6b7280; text-decoration: line-through; }
        
        .status-ready { color: #3b82f6; font-weight: bold; }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 10px;
            color: #475569;
            font-size: 0.7em;
            border-top: 1px solid #1e293b;
        }
        
        /* Mobile */
        @media screen and (max-width: 768px) {
            .header {
                padding: 15px;
            }
            .header h1 {
                font-size: 1.2em;
                letter-spacing: 1px;
            }
            .stats-bar {
                gap: 12px;
                font-size: 0.7em;
            }
            
            table, thead, tbody, th, td, tr {
                display: block;
            }
            
            thead tr {
                display: none;
            }
            
            tr {
                background-color: #1e293b;
                border: 1px solid #334155;
                border-radius: 12px;
                margin-bottom: 12px;
                padding: 8px 0;
            }
            
            td {
                border: none;
                border-bottom: 1px solid #1f2937;
                position: relative;
                padding: 12px 12px 12px 45%;
                text-align: left;
                font-size: 0.9em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            td:last-child {
                border-bottom: none;
            }
            
            td:before {
                position: absolute;
                top: 12px;
                left: 12px;
                width: 35%;
                padding-right: 10px;
                white-space: nowrap;
                font-weight: bold;
                color: #fbbf24;
                text-transform: uppercase;
                font-size: 0.7em;
                content: attr(data-label);
            }
        }
    </style>
</head>
<body>
    
    <!-- Header -->
    <div class="header">
        <h1>PrintHub Live Board</h1>
        <div class="header-status">
            <div class="status-indicator">
                <span class="status-dot active" id="status-dot"></span>
                <span id="status-text">Live</span>
            </div>
            <span style="color:#64748b;" id="update-count"></span>
            <span style="color:#64748b;" id="clock"></span>
        </div>
    </div>
    
    <!-- Pause Banner -->
    <div id="pause-banner" class="pause-banner" style="display:none;"></div>
    
    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">Active: <span class="stat-value" id="stat-active">0</span></div>
        <div class="stat-item">Ready: <span class="stat-value" id="stat-ready">0</span></div>
        <div class="stat-item">Critical: <span class="stat-value" id="stat-critical" style="color:#ef4444;">0</span></div>
        <div class="stat-item">Cancelled: <span class="stat-value" id="stat-cancelled" style="color:#6b7280;">0</span></div>
        <div class="stat-item" style="margin-left:auto; color:#64748b;" id="last-updated"></div>
    </div>
    
    <!-- Table -->
    <div class="table-container">
        <table id="flight-board">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Client</th>
                    <th>Station</th>
                    <th>File</th>
                    <th>Pages</th>
                    <th>Status</th>
                    <th>Time Left</th>
                    <th>Priority</th>
                </tr>
            </thead>
            <tbody id="board-body">
                <tr><td colspan="8" class="empty-state"><div class="icon">---</div>Loading orders...</td></tr>
            </tbody>
        </table>
    </div>
    
    <!-- Footer -->
    <div class="footer">
        Auto-refreshes every 3 seconds | PrintHub &copy; {% now "Y" %}
    </div>

    <script>
        let updateCount = 0;
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('en-US', { hour12: false });
        }
        
        function updateBoard() {
            fetch('/orders/live-board/api/')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('board-body');
                    tbody.innerHTML = '';
                    updateCount++;
                    
                    // Update status
                    const statusDot = document.getElementById('status-dot');
                    const statusText = document.getElementById('status-text');
                    const pauseBanner = document.getElementById('pause-banner');
                    
                    if (data.system_paused) {
                        statusDot.className = 'status-dot paused';
                        statusText.textContent = 'Paused';
                        statusText.style.color = '#ef4444';
                        pauseBanner.style.display = 'block';
                        pauseBanner.textContent = 'SYSTEM PAUSED: ' + (data.pause_reason || 'No reason given');
                    } else {
                        statusDot.className = 'status-dot active';
                        statusText.textContent = 'Live';
                        statusText.style.color = '#22c55e';
                        pauseBanner.style.display = 'none';
                    }
                    
                    document.getElementById('update-count').textContent = 
                        'Update #' + updateCount;
                    
                    // Stats
                    let activeCount = 0, readyCount = 0, criticalCount = 0, cancelledCount = 0;
                    data.orders.forEach(order => {
                        if (order.status_raw === 'ready') readyCount++;
                        if (order.status_raw === 'cancelled') cancelledCount++;
                        if (order.priority_level === 'critical' || order.priority_level === 'overdue') criticalCount++;
                        if (order.status_raw !== 'cancelled') activeCount++;
                    });
                    
                    document.getElementById('stat-active').textContent = activeCount;
                    document.getElementById('stat-ready').textContent = readyCount;
                    document.getElementById('stat-critical').textContent = criticalCount;
                    document.getElementById('stat-cancelled').textContent = cancelledCount;
                    document.getElementById('last-updated').textContent = 
                        'Last updated: ' + new Date().toLocaleTimeString();
                    
                    // Empty state
                    if (data.orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div class="icon">---</div>No active orders at the moment.</td></tr>';
                        return;
                    }
                    
                    // Render rows
                    data.orders.forEach(order => {
                        const row = document.createElement('tr');
                        const priorityClass = 'priority-' + order.priority_level;
                        const statusClass = order.status_raw === 'ready' ? 'status-ready' : '';
                        
                        row.innerHTML = `
                            <td data-label="Order"><strong>#${order.id}</strong></td>
                            <td data-label="Client">${order.client}</td>
                            <td data-label="Station">${order.station}</td>
                            <td data-label="File" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;" title="${order.file_name || ''}">${order.file_name || '---'}</td>
                            <td data-label="Pages">${order.page_count || '---'}${order.is_color ? ' <span style="color:#a855f7;">C</span>' : ''}</td>
                            <td data-label="Status" class="${statusClass}">${order.status}</td>
                            <td data-label="Time Left" class="${priorityClass}">${order.time_left}</td>
                            <td data-label="Priority" class="${priorityClass}">${order.priority}</td>
                        `;
                        
                        // Overdue rows get highlighted
                        if (order.is_overdue && order.status_raw !== 'cancelled') {
                            row.style.backgroundColor = 'rgba(220, 38, 38, 0.08)';
                        }
                        
                        tbody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error fetching board data:', error);
                    document.getElementById('status-dot').className = 'status-dot idle';
                    document.getElementById('status-text').textContent = 'Error';
                    document.getElementById('status-text').style.color = '#f59e0b';
                });
        }
        
        // Initial load
        updateClock();
        updateBoard();
        
        // Intervals
        setInterval(updateClock, 1000);
        setInterval(updateBoard, 3000);
    </script>
</body>
</html>
