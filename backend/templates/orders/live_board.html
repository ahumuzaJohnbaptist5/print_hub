<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Print Hub Departures</title>
    <style>
        body {
            background-color: #111;
            color: #f5c518; /* Airport amber/yellow */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid #f5c518;
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        
        /* --- DESKTOP TABLE STYLING --- */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
            font-size: 1.1em;
        }
        th {
            background-color: #222;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        
        /* --- PRIORITY COLORS & ANIMATIONS --- */
        .priority-normal { color: #4caf50; } /* Green */
        .priority-high { color: #f5c518; }   /* Amber */
        .priority-urgent { color: #ff9800; } /* Orange */
        .priority-critical { color: #f44336; animation: blink 1s infinite; } /* Red blinking */
        .priority-overdue { color: #ff0000; animation: blink 0.5s infinite; font-weight: bold; } /* Bright Red fast blink */
        .status-ready { color: #2196f3; font-weight: bold; } /* Blue for ready */

        @keyframes blink {
            50% { opacity: 0.3; }
        }
        
        .loading-text {
            text-align: center;
            font-size: 1.5em;
            color: #888;
        }

        /* ==========================================
           MOBILE RESPONSIVE STYLES (Max width 768px)
           ========================================== */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }
            h1 {
                font-size: 1.4em;
                letter-spacing: 1px;
                margin-bottom: 20px;
            }

            /* Transform table elements into blocks */
            table, thead, tbody, th, td, tr {
                display: block;
            }
            
            /* Hide the table headers on mobile */
            thead tr {
                display: none;
            }
            
            /* Style each row as a standalone card */
            tr {
                background-color: #1a1a1a;
                border: 1px solid #333;
                border-radius: 12px;
                margin-bottom: 15px;
                padding: 10px 0;
                box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            }
            
            /* Style each cell inside the card */
            td {
                border: none;
                border-bottom: 1px solid #2a2a2a;
                position: relative;
                /* Add padding to the left so text doesn't overlap the label */
                padding: 15px 15px 15px 45%; 
                text-align: left;
                font-size: 1em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            td:last-child {
                border-bottom: none;
            }
            
            /* Inject the data-label as a bold amber label on the left */
            td:before {
                position: absolute;
                top: 15px;
                left: 15px;
                width: 35%;
                padding-right: 10px;
                white-space: nowrap;
                font-weight: bold;
                color: #f5c518;
                text-transform: uppercase;
                font-size: 0.8em;
                content: attr(data-label);
            }
            
            /* Adjust loading text for mobile */
            .loading-text {
                font-size: 1.2em;
                padding: 20px;
                text-align: center;
                display: block;
            }
        }
    </style>
</head>
<body>
    <h1>Live Print Hub Departures</h1>
    
    <table id="flight-board">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Client</th>
                <th>Station</th>
                <th>Status</th>
                <th>Time Left</th>
                <th>Priority</th>
            </tr>
        </thead>
        <tbody id="board-body">
            <tr><td colspan="6" class="loading-text">Loading flights...</td></tr>
        </tbody>
    </table>

    <script>
        function updateBoard() {
            fetch("{% url 'live_board_api' %}")
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('board-body');
                    tbody.innerHTML = ''; 

                    if (data.orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="loading-text">No active flights (orders) at the moment.</td></tr>';
                        return;
                    }

                    data.orders.forEach(order => {
                        const row = document.createElement('tr');
                        
                        const priorityClass = `priority-${order.priority_level}`;
                        const statusClass = order.status_raw === 'ready' ? 'status-ready' : '';

                        // Added data-label attributes for mobile responsiveness
                        row.innerHTML = `
                            <td data-label="Order">#${order.id}</td>
                            <td data-label="Client">${order.client}</td>
                            <td data-label="Station">${order.station}</td>
                            <td data-label="Status" class="${statusClass}">${order.status}</td>
                            <td data-label="Time Left" class="${priorityClass}">${order.time_left}</td>
                            <td data-label="Priority" class="${priorityClass}">${order.priority}</td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(error => console.error('Error fetching board data:', error));
        }

        updateBoard();
        setInterval(updateBoard, 3000); // Updates every 3 seconds
    </script>
</body>
</html>
