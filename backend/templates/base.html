<!-- Desktop Menu -->
<div class="hidden md:flex items-center space-x-4">
    {% if user.is_authenticated %}
        <span class="text-gray-300 text-sm">Welcome, {{ user.first_name|default:user.username }}</span>
        
        {% if user.role == 'client' %}
            <a href="{% url 'profile' %}" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10">Profile</a>
            <a href="{% url 'upload' %}" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10">Upload</a>
        {% endif %}
        
        {% if user.is_staff or user.role == 'agent' %}
            <a href="{% url 'admin_approve_payments' %}" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10">Payments</a>
        {% endif %}
        
        <form method="POST" action="{% url 'logout' %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10">Logout</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10">Login</a>
        <a href="{% url 'register' %}" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded-lg hover:shadow-lg transition-all text-sm font-medium">Register</a>
    {% endif %}
</div>
