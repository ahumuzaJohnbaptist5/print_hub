{% extends 'base.html' %}

{% block title %}Live Departures - PrintHub{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Live Print Hub Departures</h1>
        <p class="text-gray-400">Real-time status of all active print orders</p>
    </div>

    <div class="bg-slate-800/50 backdrop-blur-md border border-white/10 rounded-xl overflow-hidden shadow-lg">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-900/50 border-b border-white/10">
                    <th class="px-6 py-4 text-sm font-semibold text-gray-300 uppercase tracking-wider">Order ID</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-300 uppercase tracking-wider">Client</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-300 uppercase tracking-wider">Station</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-300 uppercase tracking-wider">Status</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-300 uppercase tracking-wider">Time Left</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-300 uppercase tracking-wider">Priority</th>
                </tr>
            </thead>
            <tbody id="board-body" class="divide-y divide-white/5">
                <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                        <div class="flex items-center justify-center space-x-2">
                            <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span>Loading flights...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function updateBoard() {
        fetch("{% url 'live_board_api' %}")
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('board-body');
                tbody.innerHTML = ''; 

                if (data.orders.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                                No active flights (orders) at the moment.
                            </td>
                        </tr>
                    `;
                    return;
                }

                data.orders.forEach(order => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-white/5 transition-colors';
                    
                    let priorityClass = 'text-green-400';
                    if (order.priority_level === 'high') priorityClass = 'text-yellow-400';
                    else if (order.priority_level === 'urgent') priorityClass = 'text-orange-400';
                    else if (order.priority_level === 'critical') priorityClass = 'text-red-400 animate-pulse';
                    else if (order.priority_level === 'overdue') priorityClass = 'text-red-600 font-bold animate-pulse';

                    let statusClass = 'text-gray-300';
                    if (order.status_raw === 'ready') statusClass = 'text-blue-400 font-semibold';
                    else if (order.status_raw === 'printing') statusClass = 'text-purple-400';

                    row.innerHTML = `
                        <td class="px-6 py-4 text-sm text-white font-mono">#${order.id}</td>
                        <td class="px-6 py-4 text-sm text-gray-300">${order.client}</td>
                        <td class="px-6 py-4 text-sm text-gray-300">${order.station}</td>
                        <td class="px-6 py-4 text-sm ${statusClass}">${order.status}</td>
                        <td class="px-6 py-4 text-sm font-mono ${priorityClass}">${order.time_left}</td>
                        <td class="px-6 py-4 text-sm font-bold ${priorityClass}">${order.priority}</td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(error => console.error('Error fetching board data:', error));
    }

    updateBoard();
    setInterval(updateBoard, 3000); // Updates every 3 seconds
</script>
{% endblock %}
