{% extends 'base.html' %}

{% block title %}Live Departures - PrintHub{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 py-4 sm:py-8">
    <div class="text-center mb-4 sm:mb-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Live Print Hub Departures</h1>
        <p class="text-gray-400 text-sm sm:text-base">Real-time status of all active print orders</p>
    </div>

    <!-- SYSTEM PAUSE ALERT BANNER -->
    <div id="pause-banner" class="hidden mb-6">
        <div class="bg-red-600/80 border border-red-500 text-white p-4 rounded-xl shadow-lg flex items-center justify-between backdrop-blur-sm">
            <div class="flex items-center space-x-3">
                <svg class="h-8 w-8 animate-pulse text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <div>
                    <p class="font-bold text-lg">SYSTEM PAUSED</p>
                    <p id="pause-reason-text" class="text-sm opacity-90"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- DESKTOP TABLE (Hidden on mobile screens)   -->
    <!-- ========================================== -->
    <div class="hidden md:block bg-slate-800/50 backdrop-blur-md border border-white/10 rounded-xl overflow-hidden shadow-lg">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="bg-slate-900/50 border-b border-white/10">
                        <th class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-semibold text-gray-300 uppercase tracking-wider whitespace-nowrap">Order ID</th>
                        <th class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-semibold text-gray-300 uppercase tracking-wider whitespace-nowrap">Client</th>
                        <th class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-semibold text-gray-300 uppercase tracking-wider whitespace-nowrap">Station</th>
                        <th class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-semibold text-gray-300 uppercase tracking-wider whitespace-nowrap">Status</th>
                        <th class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-semibold text-gray-300 uppercase tracking-wider whitespace-nowrap">Time Left</th>
                        <th class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-semibold text-gray-300 uppercase tracking-wider whitespace-nowrap">Priority</th>
                    </tr>
                </thead>
                <tbody id="desktop-board-body" class="divide-y divide-white/5">
                    <tr>
                        <td colspan="6" class="px-3 py-8 text-center text-gray-500">Loading flights...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- MOBILE CARDS (Hidden on desktop screens)   -->
    <!-- ========================================== -->
    <div id="mobile-board-body" class="md:hidden space-y-4">
        <div class="text-center text-gray-500 py-8">Loading flights...</div>
    </div>
</div>

<script>
    function updateBoard() {
        fetch("{% url 'live_board_api' %}")
            .then(response => response.json())
            .then(data => {
                const desktopBody = document.getElementById('desktop-board-body');
                const mobileBody = document.getElementById('mobile-board-body');
                
                // Clear both containers before updating
                desktopBody.innerHTML = '';
                mobileBody.innerHTML = '';

                // 1. Handle System Pause Banner
                const pauseBanner = document.getElementById('pause-banner');
                const pauseReasonText = document.getElementById('pause-reason-text');
                if (data.system_paused) {
                    pauseBanner.classList.remove('hidden');
                    pauseReasonText.textContent = data.pause_reason || 'Unforeseen circumstances';
                } else {
                    pauseBanner.classList.add('hidden');
                }

                // 2. Handle Empty State
                if (data.orders.length === 0) {
                    desktopBody.innerHTML = `<tr><td colspan="6" class="px-3 py-8 text-center text-gray-500">No active flights (orders) at the moment.</td></tr>`;
                    mobileBody.innerHTML = `<div class="text-center text-gray-500 py-8">No active flights (orders) at the moment.</div>`;
                    return;
                }

                // 3. Populate Data
                data.orders.forEach(order => {
                    // Determine Colors & Animations
                    let priorityClass = 'text-green-400';
                    if (order.priority_level === 'high') priorityClass = 'text-yellow-400';
                    else if (order.priority_level === 'urgent') priorityClass = 'text-orange-400';
                    else if (order.priority_level === 'critical') priorityClass = 'text-red-400 animate-pulse';
                    else if (order.priority_level === 'overdue') priorityClass = 'text-red-600 font-bold animate-pulse';
                    else if (order.priority_level === 'postponed') priorityClass = 'text-yellow-500 font-bold animate-pulse';
                    else if (order.priority_level === 'cancelled') priorityClass = 'text-gray-500 line-through';

                    let statusClass = 'text-gray-300';
                    if (order.status_raw === 'ready') statusClass = 'text-blue-400 font-semibold';
                    else if (order.status_raw === 'printing') statusClass = 'text-purple-400';
                    else if (order.status_raw === 'cancelled') statusClass = 'text-red-500 line-through font-bold';
                    
                    let rowOpacity = order.status_raw === 'cancelled' ? 'opacity-50' : '';
                    let strikeThrough = order.status_raw === 'cancelled' ? 'line-through' : '';

                    // --- DESKTOP: Create Table Row ---
                    const row = document.createElement('tr');
                    row.className = `hover:bg-white/5 transition-colors ${rowOpacity}`;
                    row.innerHTML = `
                        <td class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm text-white font-mono whitespace-nowrap ${strikeThrough}">#${order.id}</td>
                        <td class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm text-gray-300 whitespace-nowrap ${strikeThrough}">${order.client}</td>
                        <td class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm text-gray-300 whitespace-nowrap">${order.station}</td>
                        <td class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm ${statusClass} whitespace-nowrap">${order.status}</td>
                        <td class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-mono ${priorityClass} whitespace-nowrap">${order.time_left}</td>
                        <td class="px-3 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-bold ${priorityClass} whitespace-nowrap">${order.priority}</td>
                    `;
                    desktopBody.appendChild(row);

                    // --- MOBILE: Create Card ---
                    const card = document.createElement('div');
                    card.className = `bg-slate-800/80 border border-white/10 rounded-xl p-4 shadow-lg ${rowOpacity}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3 border-b border-white/10 pb-3">
                            <div>
                                <span class="text-white font-bold text-lg font-mono ${strikeThrough}">#${order.id}</span>
                                <span class="text-gray-400 text-sm ml-2 ${strikeThrough}">${order.client}</span>
                            </div>
                            <span class="px-2 py-1 rounded text-xs font-bold ${statusClass} bg-white/10 whitespace-nowrap">
                                ${order.status}
                            </span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 text-sm mt-3">
                            <div>
                                <p class="text-gray-500 text-xs uppercase tracking-wide">Station</p>
                                <p class="text-gray-300 font-medium">${order.station}</p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-xs uppercase tracking-wide">Priority</p>
                                <p class="font-bold ${priorityClass}">${order.priority}</p>
                            </div>
                            <div class="col-span-2 bg-black/20 rounded-lg p-3 text-center mt-2">
                                <p class="text-gray-500 text-xs uppercase tracking-wide mb-1">Time Left</p>
                                <p class="text-2xl font-mono font-bold ${priorityClass}">${order.time_left}</p>
                            </div>
                        </div>
                    `;
                    mobileBody.appendChild(card);
                });
            })
            .catch(error => console.error('Error fetching board data:', error));
    }

    updateBoard();
    setInterval(updateBoard, 3000); // Updates every 3 seconds
</script>
{% endblock %}
