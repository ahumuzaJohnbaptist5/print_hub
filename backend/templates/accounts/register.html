{% extends 'base.html' %}

{% block title %}Register - PrintHub{% endblock %}

{% block content %}
<div class="relative overflow-hidden py-20">
    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

    <div class="relative z-10 max-w-md mx-auto px-4">
        <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-3xl p-8">
            <h2 class="text-3xl font-bold text-white text-center mb-6">Create Account</h2>
            
            {% if error %}
            <div class="bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-4">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="{% url 'register' %}" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input 
                        type="text" 
                        name="username" 
                        class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                    <input 
                        type="email" 
                        name="email" 
                        class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input 
                        type="password" 
                        name="password" 
                        class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Account Type</label>
                    <select 
                        name="role" 
                        class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="student" class="bg-slate-800">Student (Client)</option>
                        <option value="admin" class="bg-slate-800">Administrator</option>
                        <option value="agent" class="bg-slate-800">Station Agent</option>
                    </select>
                </div>
                
                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 rounded-xl hover:shadow-lg hover:shadow-blue-500/30 transition-all hover:-translate-y-1"
                >
                    Create Account
                </button>
            </form>
            
            <p class="text-center text-gray-400 text-sm mt-6">
                Already have an account? <a href="{% url 'login' %}" class="text-blue-400 hover:text-blue-300 font-semibold">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
