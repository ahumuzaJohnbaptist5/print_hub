{% extends 'base.html' %}

{% block title %}Verify Email - PrintHub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-20 text-center">
    <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-3xl p-8">
        <span class="inline-block text-xs font-bold uppercase tracking-wider text-green-400 bg-green-500/20 px-4 py-2 rounded-full mb-6">Verified</span>
        <h1 class="text-3xl font-bold text-white mb-4">Email Verified!</h1>
        <p class="text-gray-400 mb-8">Your account is now active. You can log in and start printing.</p>
        <a href="{% url 'login' %}" class="inline-block bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold px-8 py-3 rounded-xl hover:shadow-lg transition-all">
            Go to Login
        </a>
    </div>
</div>
{% endblock %}
