{% extends 'base.html' %}

{% block title %}All Links - PrintHub{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8 sm:py-12">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">PrintHub Navigation Index</h1>
        <p class="text-gray-400">Quick access to all pages, dashboards, and tools</p>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {% for link in links %}
        <a href="{{ link.url }}" class="block bg-slate-800/50 hover:bg-slate-700/50 border border-white/10 rounded-xl p-5 transition-all hover:scale-[1.02] hover:shadow-lg hover:border-blue-500/50">
            <h2 class="text-lg font-bold text-white mb-1">{{ link.name }}</h2>
            <p class="text-gray-400 text-sm mb-3">{{ link.desc }}</p>
            <p class="text-blue-400 text-xs font-mono truncate bg-black/20 px-2 py-1 rounded">{{ link.url }}</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
